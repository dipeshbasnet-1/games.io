<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2048 Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header>
<div class="title-row">
<h1>2048</h1>

<div class="scores">
<div class="score-box">
<span>SCORE</span>
<h2 id="score">0</h2>
</div>

<div class="score-box best">
<span>BEST</span>
<h2 id="best">0</h2>
</div>
</div>

</div>

<p class="subtitle">
Join tiles to reach <strong>2048!</strong>
</p>
</header>


<div class="controls">
<button id="new-btn">New Game</button>
<button id="undo-btn">Undo</button>

<div class="sizes">
<button class="size-btn active" data-size="4">4×4</button>
<button class="size-btn" data-size="5">5×5</button>
<button class="size-btn" data-size="6">6×6</button>
</div>
</div>


<div class="board-wrapper">
<div id="board"></div>
</div>

<p class="hint">
Use arrow keys or swipe
</p>

</div>

<script src="2048.js"></script>

</body>
</html>
